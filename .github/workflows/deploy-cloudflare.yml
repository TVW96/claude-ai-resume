name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Production environment includes both deployment URLs:
    # - Cloudflare Pages: https://claude-ai-resume.pages.dev
    # - Netlify: Configure in GitHub Settings > Environments > production
    environment:
      name: production
      url: https://claude-ai-resume.pages.dev
    permissions:
      contents: read
      deployments: write
    
    name: Deploy to Cloudflare Pages
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: claude-ai-resume
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
