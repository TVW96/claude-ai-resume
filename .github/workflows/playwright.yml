name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
  track-production-deployments:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: Cloudflare Workers
            url: https://claude-ai-resume.troyvw96.workers.dev
          - provider: Netlify
            url: https://famous-cascaron-ee40a2.netlify.app
    name: Track ${{ matrix.provider }} production deployment
    environment:
      name: production
      url: ${{ matrix.url }}
    steps:
    - name: Verify deployment URL responds
      run: |
        curl --fail --silent --show-error --location \
          --retry 20 \
          --retry-delay 15 \
          --retry-all-errors \
          "${{ matrix.url }}"
